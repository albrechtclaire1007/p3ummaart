<!DOCTYPE html> <html lang="lb"> <head> <meta charset="utf-8"/> <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/> <title>P3 – Um Maart</title> <style> @font-face{ font-family:'Schoulschrëft'; src:url('https://raw.githubusercontent.com/albrechtclaire1007/schoulschreft/main/schoulschreft_bold%5B2%5D.TTF') format('truetype'); font-weight:bold; font-style:normal; font-display:swap; } :root{ /* P3 light blue background */ --bg1:#E7F5FF; --bg2:#CFEAFF; /* bar + accents */ --bar:#6FAFE6; --barBorder:#4D90CD; --ink:#1f1f1f; --white:#fff; --border:3px; --shadow:0 10px 24px rgba(0,0,0,.08); --pad:clamp(10px,2.2vw,16px); --r:18px; /* icons */ --iconArrow:"https://i.postimg.cc/QBYTSN08/p3arrow.png"; --iconPlay:"https://i.postimg.cc/ZB9yQkMt/p3play.png"; --iconReplay:"https://i.postimg.cc/ft30P4rQ/p3replay.png"; } *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; outline:none;} html,body{ height:100%; margin:0; background:linear-gradient(135deg,var(--bg2),var(--bg1)); color:var(--ink); font-family:'Schoulschrëft', Arial, sans-serif; } .hidden{display:none!important;} /* ===== TOP BAR (everything inside) ===== */ .topBar{ position:sticky; top:10px; z-index:10; width:min(1200px,96vw); margin:10px auto 0; background:var(--bar); border:var(--border) solid var(--barBorder); border-radius:999px; box-shadow:var(--shadow); padding:10px 12px; display:grid; grid-template-columns: 70px 1fr auto; align-items:center; gap:10px; } .barBtn{ border:none; background:transparent; cursor:pointer; display:grid; place-items:center; width:54px; height:54px; } .barBtn:active{transform:scale(.98);} .barBtn img{width:46px; height:46px; object-fit:contain;} .barBtn.back img{transform:rotate(180deg);} .barTitle{ text-align:center; color:#fff; font-size:clamp(1.5rem,3.2vw,2.4rem); margin:0; line-height:1.1; padding:0 6px; } .barRight{ display:flex; align-items:center; gap:6px; } .barRight .barBtn{width:50px; height:50px;} .barRight .barBtn img{width:42px; height:42px;} /* ===== CONTENT ===== */ .wrap{ width:min(1200px,96vw); margin:18px auto 26px; padding:var(--pad); display:flex; flex-direction:column; gap:14px; } .card{ background:rgba(255,255,255,.8); border:var(--border) solid rgba(255,255,255,.65); border-radius:var(--r); box-shadow:var(--shadow); padding:clamp(12px,2.2vw,18px); } .cardTitle{ margin:0 0 8px 0; font-size:clamp(1.1rem,2.2vw,1.5rem); opacity:.9; } .placeholder{ border:3px dashed rgba(0,0,0,.2); border-radius:14px; padding:18px; background:rgba(255,255,255,.55); font-size:1.05rem; opacity:.85; } </style> </head> <body> <div class="topBar"> <button class="barBtn back" id="prev" aria-label="Virdrun"> <img src="https://i.postimg.cc/QBYTSN08/p3arrow.png" alt=""> </button> <h1 class="barTitle" id="gameTitle">P3 – Um Maart</h1> <div class="barRight"> <button class="barBtn" id="play" aria-label="Play"> <img src="https://i.postimg.cc/ZB9yQkMt/p3play.png" alt=""> </button> <button class="barBtn" id="replay" aria-label="Replay"> <img src="https://i.postimg.cc/ft30P4rQ/p3replay.png" alt=""> </button> <button class="barBtn" id="next" aria-label="Nächst"> <img src="https://i.postimg.cc/QBYTSN08/p3arrow.png" alt=""> </button> </div> </div> <div class="wrap"> <style> .game{display:none;} .game.active{display:block;} .miniInfo{ font-size:clamp(1.05rem,2.4vw,1.45rem); text-align:center; margin:0 0 14px; } .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; } .picBtn,.memCard,.tile{ border:3px solid rgba(77,144,205,.35); border-radius:18px; background:#fff; min-height:130px; display:grid; place-items:center; padding:10px; box-shadow:0 5px 12px rgba(0,0,0,.06); cursor:pointer; font-family:'Schoulschrëft', Arial, sans-serif; font-size:clamp(1.05rem,2.4vw,1.5rem); } .picBtn img{ width:100%; max-width:120px; height:95px; object-fit:contain; } .ok{background:#b7f0c8!important;} .bad{background:#ffcccc!important;} .memoryGrid{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; } .memCard{ min-height:112px; background:#fff; } .memCard img{ width:100%; max-width:95px; height:76px; object-fit:contain; } .memCard.closed{ background:#cfeaff; color:transparent; } .memCard.closed img{display:none;} .sortWrap{ display:grid; grid-template-columns:1fr; gap:14px; } .pool,.cols{ display:grid; gap:12px; } .pool{ grid-template-columns:repeat(auto-fit,minmax(115px,1fr)); } .cols{ grid-template-columns:repeat(3,1fr); } .col{ min-height:220px; background:rgba(255,255,255,.65); border:3px dashed rgba(77,144,205,.45); border-radius:18px; padding:10px; } .col h2{ text-align:center; margin:0 0 10px; font-size:clamp(1.1rem,2.4vw,1.55rem); } .tile{ min-height:90px; margin:6px 0; text-align:center; } .tile img{ width:78px; height:58px; object-fit:contain; display:block; margin:auto; } @media(max-width:700px){ .memoryGrid{grid-template-columns:repeat(3,1fr);} .cols{grid-template-columns:1fr;} .picBtn{min-height:116px;} } </style> <div class="card game active" id="gameListen"> <p class="cardTitle">Lauschter a klick</p> <p class="miniInfo" id="listenInfo">Lauschter a klick op dat richtegt Bild.</p> <div class="grid" id="listenGrid"></div> </div> <div class="card game" id="gameMemory"> <p class="cardTitle">Memory</p> <p class="miniInfo">Fann d’Bild an d’Wuert.</p> <div class="memoryGrid" id="memoryGrid"></div> </div> <div class="card game" id="gameSort"> <p class="cardTitle">Sortéier nom Genre</p> <p class="miniInfo">Klick en Wuert un a klick duerno an déi richteg Kolonn.</p> <div class="sortWrap"> <div class="pool" id="sortPool"></div> <div class="cols" id="sortCols"></div> </div> </div> </div> <script> const AUDIO_BASE = "https://github.com/albrechtclaire1007/p3ummaart/raw/refs/heads/main/"; const ITEMS = [ {word:"den Apel", short:"Apel", img:"https://i.postimg.cc/wyzTm2z7/apel.png", audio:"Apel.mp3", gender:"m"}, {word:"d’Bier", short:"Bier", img:"https://i.postimg.cc/YG7qWR7t/bier.png", audio:"Bir.mp3", gender:"f"}, {word:"d’Orange", short:"Orange", img:"https://i.postimg.cc/QKx86MVw/orange.png", audio:"orange.mp3", gender:"f"}, {word:"d’Zitroun", short:"Zitroun", img:"https://i.postimg.cc/1493RvM2/zitroun.png", audio:"Zitroun.mp3", gender:"f"}, {word:"d’Drauf", short:"Drauf", img:"https://i.postimg.cc/4714bc4H/drauf.png", audio:"Drauf.mp3", gender:"f"}, {word:"d’Äerdbier", short:"Äerdbier", img:"https://i.postimg.cc/Bjdvqswg/aerdbier.png", audio:"aerdbier.mp3", gender:"f"}, {word:"d’Noss", short:"Noss", img:"https://i.postimg.cc/dZtsW0LF/noss.png", audio:"Noss.mp3", gender:"f"}, {word:"d’Uebst", short:"Uebst", img:"https://i.postimg.cc/8fPpyCjz/uebst.png", audio:"Uebst.mp3", gender:"n"}, {word:"de Champignon", short:"Champignon", img:"https://i.postimg.cc/0Mv2wnvQ/champignon.png", audio:"Champignon.mp3", gender:"m"}, {word:"d’Gromper", short:"Gromper", img:"https://i.postimg.cc/phBVYjV6/gromperen.png", audio:"Gromperen.mp3", gender:"f"}, {word:"d’Tomat", short:"Tomat", img:"https://i.postimg.cc/30J8LwWs/tomat.png", audio:"Tomat.mp3", gender:"f"}, {word:"d’Zalot", short:"Zalot", img:"https://i.postimg.cc/t7X4RB2b/zalot.png", audio:"Zalot.mp3", gender:"f"}, {word:"d’Kornischong", short:"Kornischong", img:"https://i.postimg.cc/hz04bm42/kornischong.png", audio:"Kornischong.mp3", gender:"f"}, {word:"d’Aubergine", short:"Aubergine", img:"https://i.postimg.cc/ftsT9Css/aubergine.png", audio:"Aubergine.mp3", gender:"f"}, {word:"d’Wo", short:"Wo", img:"https://i.postimg.cc/hhSt42MT/wo.png", audio:"Wo.mp3", gender:"f"}, {word:"d’Geméis", short:"Geméis", img:"https://i.postimg.cc/jwhqQfqX/gemeis.png", audio:"Gemeis.mp3", gender:"n"} ]; const GAMES = ["gameListen","gameMemory","gameSort"]; const TITLES = ["Lauschter a klick","Memory","Sortéier nom Genre"]; let gameIndex = 0; let currentAudio = null; function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); } function playAudio(src){ if(currentAudio){currentAudio.pause(); currentAudio.currentTime=0;} currentAudio = new Audio(src); currentAudio.play().catch(()=>{}); } function showGame(i){ gameIndex = (i + GAMES.length) % GAMES.length; document.querySelectorAll(".game").forEach(g=>g.classList.remove("active")); document.getElementById(GAMES[gameIndex]).classList.add("active"); document.getElementById("gameTitle").textContent = TITLES[gameIndex]; resetCurrent(); } /* LISTEN */ let listenOrder = []; let listenIndex = 0; function resetListen(){ listenOrder = shuffle(ITEMS); listenIndex = 0; renderListen(); setTimeout(playListen,250); } function playListen(){ const item = listenOrder[listenIndex]; if(item) playAudio(AUDIO_BASE + item.audio); } function renderListen(){ const grid = document.getElementById("listenGrid"); grid.innerHTML = ""; shuffle(ITEMS).forEach(item=>{ const btn = document.createElement("button"); btn.className = "picBtn"; btn.innerHTML = `<img src="${item.img}" alt=""><span>${item.short}</span>`; btn.onclick = ()=>{ if(item.short === listenOrder[listenIndex].short){ btn.classList.add("ok"); setTimeout(()=>{ listenIndex++; if(listenIndex >= listenOrder.length) listenIndex = 0; renderListen(); playListen(); },650); }else{ btn.classList.add("bad"); setTimeout(()=>btn.classList.remove("bad"),500); } }; grid.appendChild(btn); }); } /* MEMORY */ let firstCard = null; let lockMemory = false; function resetMemory(){ firstCard = null; lockMemory = false; const chosen = shuffle(ITEMS).slice(0,8); const cards = []; chosen.forEach((item,idx)=>{ cards.push({pair:idx,type:"img",item}); cards.push({pair:idx,type:"word",item}); }); const grid = document.getElementById("memoryGrid"); grid.innerHTML = ""; shuffle(cards).forEach(card=>{ const el = document.createElement("button"); el.className = "memCard closed"; el.dataset.pair = card.pair; el.dataset.open = "0"; el.innerHTML = card.type==="img" ? `<img src="${card.item.img}" alt="">` : `<span>${card.item.word}</span>`; el.onclick = ()=>{ if(lockMemory || el.dataset.open==="1") return; el.classList.remove("closed"); el.dataset.open = "1"; if(card.type==="word") playAudio(AUDIO_BASE + card.item.audio); if(!firstCard){ firstCard = el; }else{ lockMemory = true; if(firstCard.dataset.pair === el.dataset.pair){ firstCard.classList.add("ok"); el.classList.add("ok"); firstCard = null; lockMemory = false; }else{ firstCard.classList.add("bad"); el.classList.add("bad"); setTimeout(()=>{ firstCard.classList.remove("bad"); el.classList.remove("bad"); firstCard.classList.add("closed"); el.classList.add("closed"); firstCard.dataset.open = "0"; el.dataset.open = "0"; firstCard = null; lockMemory = false; },850); } } }; grid.appendChild(el); }); } /* SORT */ let selectedTile = null; function resetSort(){ selectedTile = null; const pool = document.getElementById("sortPool"); const cols = document.getElementById("sortCols"); pool.innerHTML = ""; cols.innerHTML = ""; [ {id:"m",label:"männlech"}, {id:"f",label:"weiblech"}, {id:"n",label:"sächlech"} ].forEach(cat=>{ const col = document.createElement("div"); col.className = "col"; col.dataset.cat = cat.id; col.innerHTML = `<h2>${cat.label}</h2>`; col.onclick = ()=>{ if(!selectedTile) return; if(selectedTile.dataset.cat === cat.id){ selectedTile.classList.remove("bad"); selectedTile.classList.add("ok"); col.appendChild(selectedTile); selectedTile = null; }else{ selectedTile.classList.add("bad"); setTimeout(()=>selectedTile && selectedTile.classList.remove("bad"),450); } }; cols.appendChild(col); }); shuffle(ITEMS).forEach(item=>{ const tile = document.createElement("button"); tile.className = "tile"; tile.dataset.cat = item.gender; tile.innerHTML = `<img src="${item.img}" alt=""><span>${item.word}</span>`; tile.onclick = (e)=>{ e.stopPropagation(); document.querySelectorAll(".tile").forEach(t=>t.style.outline="none"); selectedTile = tile; tile.style.outline = "4px solid #4D90CD"; playAudio(AUDIO_BASE + item.audio); }; pool.appendChild(tile); }); } function resetCurrent(){ if(gameIndex===0) resetListen(); if(gameIndex===1) resetMemory(); if(gameIndex===2) resetSort(); } document.getElementById('prev').onclick = ()=>showGame(gameIndex-1); document.getElementById('next').onclick = ()=>showGame(gameIndex+1); document.getElementById('play').onclick = ()=>{ if(gameIndex===0) playListen(); }; document.getElementById('replay').onclick = ()=>resetCurrent(); resetListen(); </script> </body> </html>
