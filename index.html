 <!DOCTYPE html> <html lang="lb"> <head> <meta charset="utf-8"/> <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/> <title>P3 – Um Maart</title> <style> @font-face{ font-family:'Schoulschrëft'; src:url('https://raw.githubusercontent.com/albrechtclaire1007/schoulschreft/main/schoulschreft_bold%5B2%5D.TTF') format('truetype'); font-weight:bold; font-style:normal; font-display:swap; } :root{ /* P3 light blue background */ --bg1:#E7F5FF; --bg2:#CFEAFF; /* bar + accents */ --bar:#6FAFE6; --barBorder:#4D90CD; --ink:#1f1f1f; --white:#fff; --border:3px; --shadow:0 10px 24px rgba(0,0,0,.08); --pad:clamp(10px,2.2vw,16px); --r:18px; /* icons */ --iconArrow:"https://i.postimg.cc/QBYTSN08/p3arrow.png"; --iconPlay:"https://i.postimg.cc/ZB9yQkMt/p3play.png"; --iconReplay:"https://i.postimg.cc/ft30P4rQ/p3replay.png"; } *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; outline:none;} html,body{ height:100%; margin:0; background:linear-gradient(135deg,var(--bg2),var(--bg1)); color:var(--ink); font-family:'Schoulschrëft', Arial, sans-serif; } .hidden{display:none!important;} /* ===== TOP BAR (everything inside) ===== */ .topBar{ position:sticky; top:10px; z-index:10; width:min(1200px,96vw); margin:10px auto 0; background:var(--bar); border:var(--border) solid var(--barBorder); border-radius:999px; box-shadow:var(--shadow); padding:10px 12px; display:grid; grid-template-columns: 70px 1fr auto; align-items:center; gap:10px; } .barBtn{ border:none; background:transparent; cursor:pointer; display:grid; place-items:center; width:54px; height:54px; } .barBtn:active{transform:scale(.98);} .barBtn img{width:46px; height:46px; object-fit:contain;} .barBtn.back img{transform:rotate(180deg);} .barTitle{ text-align:center; color:#fff; font-size:clamp(1.5rem,3.2vw,2.4rem); margin:0; line-height:1.1; padding:0 6px; } .barRight{ display:flex; align-items:center; gap:6px; } .barRight .barBtn{width:50px; height:50px;} .barRight .barBtn img{width:42px; height:42px;} /* ===== CONTENT ===== */ .wrap{ width:min(1200px,96vw); margin:18px auto 26px; padding:var(--pad); display:flex; flex-direction:column; gap:14px; } .card{ background:rgba(255,255,255,.8); border:var(--border) solid rgba(255,255,255,.65); border-radius:var(--r); box-shadow:var(--shadow); padding:clamp(12px,2.2vw,18px); } .cardTitle{ margin:0 0 8px 0; font-size:clamp(1.1rem,2.2vw,1.5rem); opacity:.9; } .placeholder{ border:3px dashed rgba(0,0,0,.2); border-radius:14px; padding:18px; background:rgba(255,255,255,.55); font-size:1.05rem; opacity:.85; } </style> </head> <body> <div class="topBar"> <button class="barBtn back" id="prev" aria-label="Virdrun"> <img src="https://i.postimg.cc/QBYTSN08/p3arrow.png" alt=""> </button> <h1 class="barTitle" id="gameTitle">Lauschter a klick</h1> <div class="barRight"> <button class="barBtn" id="next" aria-label="Nächst"> <img src="https://i.postimg.cc/QBYTSN08/p3arrow.png" alt=""> </button> </div> </div> <div class="wrap"> <style> .screen{ display:none; } .screen.active{ display:block; } .listenGrid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(125px,1fr)); gap:12px; } .imageButton{ border:3px solid rgba(77,144,205,.35); border-radius:18px; background:#fff; min-height:135px; padding:10px; cursor:pointer; display:grid; place-items:center; box-shadow:0 6px 14px rgba(0,0,0,.07); } .imageButton img{ width:100%; max-width:125px; height:100px; object-fit:contain; display:block; } .imageButton.correct{ background:#b7f0c8; } .imageButton.wrong{ background:#ffcccc; } .memoryGrid{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; } .memoryCard{ border:3px solid rgba(77,144,205,.35); border-radius:18px; background:#fff; min-height:118px; padding:10px; cursor:pointer; display:grid; place-items:center; box-shadow:0 6px 14px rgba(0,0,0,.07); font-family:'Schoulschrëft', Arial, sans-serif; font-size:clamp(1rem,2.2vw,1.35rem); color:var(--ink); text-align:center; overflow:hidden; } .memoryCard img{ width:100%; max-width:95px; height:75px; object-fit:contain; display:block; } .memoryCard.closed{ background:#fff; background-image:url("https://i.postimg.cc/gnrf0LLw/cardback-p2.png"); background-size:cover; background-position:center; color:transparent; } .memoryCard.closed img, .memoryCard.closed span{ display:none; } .memoryCard.matched{ background:#b7f0c8; cursor:default; } .memoryCard.wrong{ background:#ffcccc; } .sortArea{ display:grid; gap:14px; } .sortPool{ display:grid; grid-template-columns:repeat(auto-fit,minmax(105px,1fr)); gap:10px; } .sortTile{ border:3px solid rgba(77,144,205,.35); border-radius:18px; background:#fff; min-height:105px; padding:8px; cursor:pointer; display:grid; place-items:center; box-shadow:0 6px 14px rgba(0,0,0,.07); } .sortTile img{ width:90px; height:70px; object-fit:contain; display:block; } .sortTile.selected{ border-color:#4D90CD; box-shadow:0 0 0 4px rgba(77,144,205,.25); } .sortTile.correct{ background:#b7f0c8; } .sortTile.wrong{ background:#ffcccc; } .sortColumns{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; } .sortColumn{ border:3px solid rgba(0,0,0,.18); border-radius:18px; min-height:230px; padding:10px; } .sortColumn[data-category="m"]{ background:#cfeaff; } .sortColumn[data-category="f"]{ background:#f6d0c3; } .sortColumn[data-category="n"]{ background:#d9ead3; } .sortColumn h2{ margin:0 0 10px 0; text-align:center; font-size:clamp(1.2rem,2.5vw,1.7rem); } .sortColumn .sortTile{ margin-bottom:8px; min-height:86px; background:#fff; } @media(max-width:760px){ .memoryGrid{ grid-template-columns:repeat(3,1fr); } .sortColumns{ grid-template-columns:1fr; } .imageButton{ min-height:120px; } } </style> <div class="card screen active" id="screenListen"> <div class="listenGrid" id="listenGrid"></div> </div> <div class="card screen" id="screenMemory"> <div class="memoryGrid" id="memoryGrid"></div> </div> <div class="card screen" id="screenSort"> <div class="sortArea"> <div class="sortPool" id="sortPool"></div> <div class="sortColumns" id="sortColumns"></div> </div> </div> </div> <script> const AUDIO_BASE = "https://github.com/albrechtclaire1007/p3ummaart/raw/refs/heads/main/"; const ITEMS = [ { word:"den Apel", simple:"Apel", audio:"Apel.mp3", img:"https://i.postimg.cc/wyzTm2z7/apel.png", gender:"m" }, { word:"d’Bier", simple:"Bier", audio:"Bir.mp3", img:"https://i.postimg.cc/YG7qWR7t/bier.png", gender:"f" }, { word:"d’Orange", simple:"Orange", audio:"orange.mp3", img:"https://i.postimg.cc/QKx86MVw/orange.png", gender:"f" }, { word:"d’Zitroun", simple:"Zitroun", audio:"Zitroun.mp3", img:"https://i.postimg.cc/1493RvM2/zitroun.png", gender:"f" }, { word:"d’Drauf", simple:"Drauf", audio:"Drauf.mp3", img:"https://i.postimg.cc/4714bc4H/drauf.png", gender:"f" }, { word:"d’Äerdbier", simple:"Äerdbier", audio:"aerdbier.mp3", img:"https://i.postimg.cc/Bjdvqswg/aerdbier.png", gender:"f" }, { word:"d’Noss", simple:"Noss", audio:"Noss.mp3", img:"https://i.postimg.cc/dZtsW0LF/noss.png", gender:"f" }, { word:"d’Uebst", simple:"Uebst", audio:"Uebst.mp3", img:"https://i.postimg.cc/8fPpyCjz/uebst.png", gender:"n" }, { word:"de Champignon", simple:"Champignon", audio:"Champignon.mp3", img:"https://i.postimg.cc/0Mv2wnvQ/champignon.png", gender:"m" }, { word:"d’Gromper", simple:"Gromper", audio:"Gromperen.mp3", img:"https://i.postimg.cc/phBVYjV6/gromperen.png", gender:"f" }, { word:"d’Tomat", simple:"Tomat", audio:"Tomat.mp3", img:"https://i.postimg.cc/30J8LwWs/tomat.png", gender:"f" }, { word:"d’Zalot", simple:"Zalot", audio:"Zalot.mp3", img:"https://i.postimg.cc/t7X4RB2b/zalot.png", gender:"f" }, { word:"d’Kornischong", simple:"Kornischong", audio:"Kornischong.mp3", img:"https://i.postimg.cc/hz04bm42/kornischong.png", gender:"f" }, { word:"d’Aubergine", simple:"Aubergine", audio:"Aubergine.mp3", img:"https://i.postimg.cc/ftsT9Css/aubergine.png", gender:"f" }, { word:"d’Wo", simple:"Wo", audio:"Wo.mp3", img:"https://i.postimg.cc/hhSt42MT/wo.png", gender:"f" }, { word:"d’Geméis", simple:"Geméis", audio:"Gemeis.mp3", img:"https://i.postimg.cc/jwhqQfqX/gemeis.png", gender:"n" } ]; const SCREENS = [ { id:"screenListen", title:"Lauschter a klick" }, { id:"screenMemory", title:"Memory" }, { id:"screenSort", title:"Sortéier nom Genre" } ]; let screenIndex = 0; let currentAudio = null; let listenOrder = []; let listenIndex = 0; let memoryFirst = null; let memoryLocked = false; let selectedSortTile = null; function shuffle(array){ const copy = [...array]; for(let i = copy.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); const temp = copy[i]; copy[i] = copy[j]; copy[j] = temp; } return copy; } function playAudio(file){ if(!file){ return; } if(currentAudio){ currentAudio.pause(); currentAudio.currentTime = 0; } currentAudio = new Audio(AUDIO_BASE + file); currentAudio.play().catch(function(){}); } function setScreen(newIndex){ screenIndex = (newIndex + SCREENS.length) % SCREENS.length; document.querySelectorAll(".screen").forEach(function(screen){ screen.classList.remove("active"); }); document.getElementById(SCREENS[screenIndex].id).classList.add("active"); document.getElementById("gameTitle").textContent = SCREENS[screenIndex].title; resetCurrentScreen(); } function resetCurrentScreen(){ if(screenIndex === 0){ resetListen(); } if(screenIndex === 1){ resetMemory(); } if(screenIndex === 2){ resetSort(); } } /* ===== GAME 1: LAUSCHTER A KLICK ===== */ function resetListen(){ listenOrder = shuffle(ITEMS); listenIndex = 0; renderListen(); setTimeout(function(){ playListen(); }, 250); } function playListen(){ const item = listenOrder[listenIndex]; if(item){ playAudio(item.audio); } } function renderListen(){ const grid = document.getElementById("listenGrid"); grid.innerHTML = ""; shuffle(ITEMS).forEach(function(item){ const button = document.createElement("button"); button.className = "imageButton"; button.innerHTML = '<img src="' + item.img + '" alt="">'; button.onclick = function(){ checkListenAnswer(button, item); }; grid.appendChild(button); }); } function checkListenAnswer(button, item){ const target = listenOrder[listenIndex]; if(!target){ return; } if(item.simple === target.simple){ button.classList.add("correct"); setTimeout(function(){ listenIndex++; if(listenIndex >= listenOrder.length){ listenIndex = 0; listenOrder = shuffle(ITEMS); } renderListen(); playListen(); }, 650); }else{ button.classList.add("wrong"); setTimeout(function(){ button.classList.remove("wrong"); }, 500); } } /* ===== GAME 2: MEMORY ===== */ function resetMemory(){ memoryFirst = null; memoryLocked = false; const chosen = shuffle(ITEMS).slice(0, 8); const cards = []; chosen.forEach(function(item, index){ cards.push({ pair:index, type:"image", item:item }); cards.push({ pair:index, type:"word", item:item }); }); const grid = document.getElementById("memoryGrid"); grid.innerHTML = ""; shuffle(cards).forEach(function(card){ const button = document.createElement("button"); button.className = "memoryCard closed"; button.dataset.pair = card.pair; button.dataset.open = "0"; button.dataset.matched = "0"; if(card.type === "image"){ button.innerHTML = '<img src="' + card.item.img + '" alt="">'; }else{ button.innerHTML = '<span>' + card.item.word + '</span>'; } button.onclick = function(){ openMemoryCard(button, card); }; grid.appendChild(button); }); } function openMemoryCard(button, card){ if(memoryLocked){ return; } if(button.dataset.open === "1"){ return; } if(button.dataset.matched === "1"){ return; } button.classList.remove("closed"); button.dataset.open = "1"; if(card.type === "word"){ playAudio(card.item.audio); } if(!memoryFirst){ memoryFirst = button; return; } memoryLocked = true; if(memoryFirst.dataset.pair === button.dataset.pair){ memoryFirst.classList.add("matched"); button.classList.add("matched"); memoryFirst.dataset.matched = "1"; button.dataset.matched = "1"; memoryFirst = null; memoryLocked = false; }else{ memoryFirst.classList.add("wrong"); button.classList.add("wrong"); setTimeout(function(){ memoryFirst.classList.remove("wrong"); button.classList.remove("wrong"); memoryFirst.classList.add("closed"); button.classList.add("closed"); memoryFirst.dataset.open = "0"; button.dataset.open = "0"; memoryFirst = null; memoryLocked = false; }, 900); } } /* ===== GAME 3: SORTÉIER NOM GENRE ===== */ function resetSort(){ selectedSortTile = null; const pool = document.getElementById("sortPool"); const columns = document.getElementById("sortColumns"); pool.innerHTML = ""; columns.innerHTML = ""; const categories = [ { id:"m", label:"de / den" }, { id:"f", label:"d’ / eng" }, { id:"n", label:"d’ / en / e" } ]; categories.forEach(function(category){ const column = document.createElement("div"); column.className = "sortColumn"; column.dataset.category = category.id; column.innerHTML = '<h2>' + category.label + '</h2>'; column.onclick = function(){ placeSortTile(column, category.id); }; columns.appendChild(column); }); shuffle(ITEMS).forEach(function(item){ const tile = document.createElement("button"); tile.className = "sortTile"; tile.dataset.category = item.gender; tile.dataset.audio = item.audio; tile.innerHTML = '<img src="' + item.img + '" alt="">'; tile.onclick = function(event){ event.stopPropagation(); selectSortTile(tile, item); }; pool.appendChild(tile); }); } function selectSortTile(tile, item){ document.querySelectorAll(".sortTile").forEach(function(otherTile){ otherTile.classList.remove("selected"); }); selectedSortTile = tile; selectedSortTile.classList.add("selected"); playAudio(item.audio); } function placeSortTile(column, categoryId){ if(!selectedSortTile){ return; } if(selectedSortTile.dataset.category === categoryId){ selectedSortTile.classList.remove("selected"); selectedSortTile.classList.remove("wrong"); selectedSortTile.classList.add("correct"); column.appendChild(selectedSortTile); selectedSortTile = null; }else{ selectedSortTile.classList.add("wrong"); setTimeout(function(){ if(selectedSortTile){ selectedSortTile.classList.remove("wrong"); } }, 500); } } /* ===== BUTTONS ===== */ document.getElementById("prev").onclick = function(){ setScreen(screenIndex - 1); }; document.getElementById("next").onclick = function(){ setScreen(screenIndex + 1); }; resetListen(); </script> </body> </html>
