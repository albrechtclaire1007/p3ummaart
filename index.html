<!DOCTYPE html>
<html lang="lb">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>P3 – Um Maart</title>

<style>
@font-face{
  font-family:'Schoulschrëft';
  src:url('https://raw.githubusercontent.com/albrechtclaire1007/schoulschreft/main/schoulschreft_bold%5B2%5D.TTF') format('truetype');
  font-weight:bold;
  font-style:normal;
  font-display:swap;
}

:root{
  --bg1:#E7F5FF;
  --bg2:#CFEAFF;
  --bar:#6FAFE6;
  --barBorder:#4D90CD;
  --ink:#1f1f1f;
  --white:#fff;
  --ok:#b7f0c8;
  --bad:#ffcccc;
  --border:3px;
  --shadow:0 10px 24px rgba(0,0,0,.08);
  --pad:clamp(10px,2.2vw,16px);
  --r:18px;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  outline:none;
}

html,
body{
  height:100%;
  margin:0;
  background:linear-gradient(135deg,var(--bg2),var(--bg1));
  color:var(--ink);
  font-family:'Schoulschrëft', Arial, sans-serif;
}

.hidden{
  display:none!important;
}

.topBar{
  position:sticky;
  top:10px;
  z-index:10;
  width:min(1200px,96vw);
  margin:10px auto 0;
  background:var(--bar);
  border:var(--border) solid var(--barBorder);
  border-radius:999px;
  box-shadow:var(--shadow);
  padding:10px 12px;
  display:grid;
  grid-template-columns:70px 1fr auto;
  align-items:center;
  gap:10px;
}

.barBtn{
  border:none;
  background:transparent;
  cursor:pointer;
  display:grid;
  place-items:center;
  width:54px;
  height:54px;
}

.barBtn:active{
  transform:scale(.98);
}

.barBtn img{
  width:46px;
  height:46px;
  object-fit:contain;
}

.barBtn.back img{
  transform:rotate(180deg);
}

.barTitle{
  text-align:center;
  color:#fff;
  font-size:clamp(1.5rem,3.2vw,2.4rem);
  margin:0;
  line-height:1.1;
  padding:0 6px;
}

.barRight{
  display:flex;
  align-items:center;
  gap:6px;
}

.barRight .barBtn{
  width:50px;
  height:50px;
}

.barRight .barBtn img{
  width:42px;
  height:42px;
}

.wrap{
  width:min(1200px,96vw);
  margin:18px auto 26px;
  padding:var(--pad);
  display:flex;
  flex-direction:column;
  gap:14px;
}

.card{
  background:rgba(255,255,255,.8);
  border:var(--border) solid rgba(255,255,255,.65);
  border-radius:var(--r);
  box-shadow:var(--shadow);
  padding:clamp(12px,2.2vw,18px);
}

.screen{
  display:none;
}

.screen.active{
  display:block;
}

.gameControls{
  display:flex;
  justify-content:center;
  gap:14px;
  margin-bottom:14px;
}

.gameBtn{
  border:none;
  background:#fff;
  border-radius:999px;
  width:64px;
  height:64px;
  display:grid;
  place-items:center;
  cursor:pointer;
  box-shadow:0 6px 14px rgba(0,0,0,.08);
}

.gameBtn img{
  width:48px;
  height:48px;
  object-fit:contain;
}

.listenGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(125px,1fr));
  gap:12px;
}

.imageButton{
  border:3px solid rgba(77,144,205,.35);
  border-radius:18px;
  background:#fff;
  min-height:135px;
  padding:10px;
  cursor:pointer;
  display:grid;
  place-items:center;
  box-shadow:0 6px 14px rgba(0,0,0,.07);
}

.imageButton img{
  width:100%;
  max-width:125px;
  height:100px;
  object-fit:contain;
  display:block;
}

.imageButton.correct{
  background:var(--ok);
}

.imageButton.wrong{
  background:var(--bad);
}

.memoryGrid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.memoryCard{
  border:3px solid rgba(77,144,205,.35);
  border-radius:18px;
  background:#fff;
  min-height:118px;
  padding:10px;
  cursor:pointer;
  display:grid;
  place-items:center;
  box-shadow:0 6px 14px rgba(0,0,0,.07);
  font-family:'Schoulschrëft', Arial, sans-serif;
  font-size:clamp(1rem,2.2vw,1.35rem);
  color:var(--ink);
  text-align:center;
  overflow:hidden;
}

.memoryCard img{
  width:100%;
  max-width:95px;
  height:75px;
  object-fit:contain;
  display:block;
}

.memoryCard.closed{
  background:#fff;
  background-image:url("https://i.postimg.cc/L82tT0Zg/cardback-p3.png");
  background-size:cover;
  background-position:center;
  color:transparent;
}

.memoryCard.closed img,
.memoryCard.closed span{
  display:none;
}

.memoryCard.matched{
  background:var(--ok);
  cursor:default;
}

.memoryCard.wrong{
  background:var(--bad);
}

.sortArea{
  display:grid;
  gap:14px;
}

.sortPool{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(105px,1fr));
  gap:10px;
}

.sortTile{
  border:3px solid rgba(77,144,205,.35);
  border-radius:18px;
  background:#fff;
  min-height:105px;
  padding:8px;
  cursor:pointer;
  display:grid;
  place-items:center;
  box-shadow:0 6px 14px rgba(0,0,0,.07);
}

.sortTile img{
  width:90px;
  height:70px;
  object-fit:contain;
  display:block;
}

.sortTile.selected{
  border-color:#4D90CD;
  box-shadow:0 0 0 4px rgba(77,144,205,.25);
}

.sortTile.correct{
  background:var(--ok);
}

.sortTile.wrong{
  background:var(--bad);
}

.sortColumns{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.sortColumn{
  border:3px solid rgba(0,0,0,.18);
  border-radius:18px;
  min-height:230px;
  padding:10px;
}

.sortColumn[data-category="m"]{
  background:#cfeaff;
}

.sortColumn[data-category="f"]{
  background:#f6d0c3;
}

.sortColumn[data-category="n"]{
  background:#d9ead3;
}

.sortColumn h2{
  margin:0 0 10px 0;
  text-align:center;
  font-size:clamp(1.2rem,2.5vw,1.7rem);
}

.sortColumn .sortTile{
  margin-bottom:8px;
  min-height:86px;
  background:#fff;
}

.pluralGame{
  display:grid;
  grid-template-columns:1fr 1.1fr;
  align-items:center;
  gap:20px;
  min-height:420px;
}

.pluralImageBox{
  display:grid;
  place-items:center;
  background:#fff;
  border:3px solid rgba(77,144,205,.35);
  border-radius:24px;
  min-height:300px;
  padding:20px;
}

.pluralImageBox img{
  width:100%;
  max-width:280px;
  max-height:240px;
  object-fit:contain;
}

.pluralOptions{
  display:grid;
  gap:16px;
}

.pluralOption{
  border:3px solid rgba(77,144,205,.35);
  border-radius:999px;
  background:#fff;
  padding:16px 22px;
  font-family:'Schoulschrëft', Arial, sans-serif;
  font-size:clamp(1.35rem,3vw,2rem);
  cursor:pointer;
  box-shadow:0 6px 14px rgba(0,0,0,.07);
}

.pluralOption.correct{
  background:var(--ok);
}

.pluralOption.wrong{
  background:var(--bad);
}

.shopLayout{
  display:grid;
  gap:14px;
}

.shopTop{
  display:grid;
  grid-template-columns:1fr 260px;
  gap:18px;
  align-items:start;
}

.stalls{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.stall{
  position:relative;
  aspect-ratio:1 / 0.82;
  background-image:url("https://i.postimg.cc/mk0ySLWc/marketstall.png");
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
}

.stallCompartment{
  position:absolute;
  width:34%;
  height:23%;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
  gap:0;
}

.stallCompartment[data-slot="0"]{
  left:16%;
  top:42%;
}

.stallCompartment[data-slot="1"]{
  left:52%;
  top:42%;
}

.stallCompartment[data-slot="2"]{
  left:16%;
  top:64%;
}

.stallCompartment[data-slot="3"]{
  left:52%;
  top:64%;
}

.shopItem{
  width:34px;
  height:34px;
  object-fit:contain;
  cursor:grab;
  margin:-2px;
  filter:drop-shadow(0 3px 3px rgba(0,0,0,.18));
}

.listBox{
  min-height:250px;
  background-image:url("https://i.postimg.cc/Y927p7Vq/shopping-list.png");
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center top;
  padding:76px 28px 20px;
}

.listBox ul{
  margin:0;
  padding-left:22px;
  font-size:clamp(1rem,2vw,1.25rem);
  line-height:1.55;
}

.bagDrop{
  justify-self:center;
  position:relative;
  width:min(300px,70vw);
  height:230px;
  background-image:url("https://i.postimg.cc/mg10Rkr2/opt-1250w.png");
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
}

.bagItem{
  position:absolute;
  width:48px;
  height:48px;
  object-fit:contain;
  pointer-events:none;
  filter:drop-shadow(0 3px 3px rgba(0,0,0,.18));
}
.checkBtn{
  justify-self:center;
  border:none;
  border-radius:999px;
  background:var(--bar);
  color:#fff;
  font-family:'Schoulschrëft', Arial, sans-serif;
  font-size:clamp(1.4rem,3vw,2rem);
  padding:12px 44px;
  cursor:pointer;
  box-shadow:0 6px 0 var(--barBorder);
}

.checkBtn:active{
  transform:translateY(3px);
  box-shadow:0 3px 0 var(--barBorder);
}

.shopButtons{
  display:flex;
  justify-content:center;
  gap:14px;
  align-items:center;
}

.shopMessage{
  text-align:center;
  font-size:clamp(1.3rem,2.5vw,1.8rem);
  min-height:34px;
}

.shopMessage.ok{
  color:#247844;
}

.shopMessage.bad{
  color:#b73939;
}

@media(max-width:760px){
  .memoryGrid{
    grid-template-columns:repeat(3,1fr);
  }

  .sortColumns{
    grid-template-columns:1fr;
  }

  .imageButton{
    min-height:120px;
  }

  .pluralGame{
    grid-template-columns:1fr;
  }

  .shopTop{
    grid-template-columns:1fr;
  }

  .stalls{
    grid-template-columns:1fr;
  }

  .listBox{
    justify-self:center;
    width:260px;
  }
}
</style>
</head>

<body>
<div class="topBar">
  <button class="barBtn back" id="prev" aria-label="Virdrun">
    <img src="https://i.postimg.cc/QBYTSN08/p3arrow.png" alt="">
  </button>

  <h1 class="barTitle" id="gameTitle">Lauschter a klick</h1>

  <div class="barRight">
    <button class="barBtn" id="next" aria-label="Nächst">
      <img src="https://i.postimg.cc/QBYTSN08/p3arrow.png" alt="">

</div>

<div class="wrap">
  <div class="card screen active" id="screenListen">
    <div class="gameControls">
      <button class="gameBtn" id="listenPlay" aria-label="Lauschter">
        <img src="https://i.postimg.cc/ZB9yQkMt/p3play.png" alt="">
      </button>

  <div class="card screen" id="screenSort">
    <div class="sortArea">
      <div class="sortPool" id="sortPool"></div>
      <div class="sortColumns" id="sortColumns"></div>
    </div>
  </div>

  <div class="card screen" id="screenPlural">
    <div class="pluralGame">
      <div class="pluralImageBox">
        <img id="pluralImage" src="" alt="">
      </div>

      <div class="pluralOptions" id="pluralOptions"></div>
    </div>
  </div>

  <div class="card screen" id="screenShopping">
    <div class="shopLayout">
      <div class="shopTop">
        <div class="stalls" id="stalls"></div>

        <div class="listBox">
          <ul id="shoppingList"></ul>

      </div>

      <div class="shopButtons">

  </button>
</div>

      <div class="shopMessage" id="shopMessage"></div>
    </div>
  </div>
</div>

<script>
const AUDIO_BASE = "https://github.com/albrechtclaire1007/p3ummaart/raw/refs/heads/main/";

const ITEMS = [

  },
  {

    audio:"p3_champignon.mp3",

  },
  {

    simple:"Gromper",

    plural:"Zaloten",
    audio:"p3_zalot.mp3",
    img:"https://i.postimg.cc/t7X4RB2b/zalot.png",
    gender:"f"
  },
  {
    word:"d’Kornischong",
    simple:"Kornischong",
    plural:"Kornischongen",
    audio:"p3_kornischong.mp3",
    img:"https://i.postimg.cc/hz04bm42/kornischong.png",
    gender:"f"
  },
  {
    word:"d’Aubergine",
    simple:"Aubergine",
    plural:"Auberginnen",
    audio:"p3_aubergine.mp3",
    img:"https://i.postimg.cc/ftsT9Css/aubergine.png",
    gender:"f"
  },
  {
    word:"d’Wo",
    simple:"Wo",
    plural:"Woen",
    audio:"p3_wo.mp3",
    img:"https://i.postimg.cc/hhSt42MT/wo.png",
    gender:"f"
  },
  {
    word:"d’Geméis",
    simple:"Geméis",
    plural:"Stécker Geméis",
    audio:"p3_gemeis.mp3",
    img:"https://i.postimg.cc/jwhqQfqX/gemeis.png",
    gender:"n"
  }
];

const SHOP_ITEMS = ITEMS.filter(function(item){
  return !["Uebst", "Geméis", "Wo"].includes(item.simple);
});

const NUMBER_WORDS = [
  "",
  "een",
  "zwee",
  "dräi",
  "véier",
  "fënnef",
  "sechs",
  "siwen",
  "aacht",
  "néng",
  "zéng"
];

const SCREENS = [
  {
    id:"screenListen",
    title:"Lauschter a klick"
  },
  {
    id:"screenMemory",
    title:"Memory"
  },
  {
    id:"screenSort",
    title:"Sortéier nom Genre"
  },
  {
    id:"screenPlural",
    title:"Wéi ass de Pluriel?"
  },
  {
    id:"screenShopping",
    title:"D’Akafslëscht"
  }
];

let screenIndex = 0;
let currentAudio = null;

let listenOrder = [];
let listenIndex = 0;

let memoryFirst = null;
let memoryLocked = false;

let selectedSortTile = null;

let pluralOrder = [];
let pluralIndex = 0;

let shoppingTargets = [];
let shoppingCounts = {};
let shoppingVisibleItems = [];

function shuffle(array){
  const copy = [...array];

  for(let i = copy.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    const temp = copy[i];

    copy[i] = copy[j];
    copy[j] = temp;
  }

  return copy;
}

function playAudio(file){
  if(!file){
    return;
  }

  if(currentAudio){
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }

  currentAudio = new Audio(AUDIO_BASE + file);
  currentAudio.play().catch(function(){});
}

function setScreen(newIndex){
  screenIndex = (newIndex + SCREENS.length) % SCREENS.length;

  document.querySelectorAll(".screen").forEach(function(screen){
    screen.classList.remove("active");
  });

  document.getElementById(SCREENS[screenIndex].id).classList.add("active");
  document.getElementById("gameTitle").textContent = SCREENS[screenIndex].title;

  resetCurrentScreen();
}

function resetCurrentScreen(){
  if(screenIndex === 0){
    resetListen();
  }

  if(screenIndex === 1){
    resetMemory();
  }

  if(screenIndex === 2){
    resetSort();
  }

  if(screenIndex === 3){
    resetPlural();
  }

  if(screenIndex === 4){
    resetShopping();
  }
}

/* ===== GAME 1: LAUSCHTER A KLICK ===== */

function resetListen(){
  listenOrder = shuffle(ITEMS);
  listenIndex = 0;

  renderListen();

  setTimeout(function(){
    playListen();
  }, 250);
}

function playListen(){
  const item = listenOrder[listenIndex];

  if(item){
    playAudio(item.audio);
  }
}

function renderListen(){
  const grid = document.getElementById("listenGrid");

  grid.innerHTML = "";

  shuffle(ITEMS).forEach(function(item){
    const button = document.createElement("button");

    button.className = "imageButton";
    button.innerHTML = '<img src="' + item.img + '" alt="">';

    button.onclick = function(){
      checkListenAnswer(button, item);
    };

    grid.appendChild(button);
  });
}

function checkListenAnswer(button, item){
  const target = listenOrder[listenIndex];

  if(!target){
    return;
  }

  if(item.simple === target.simple){
    button.classList.add("correct");

    setTimeout(function(){
      listenIndex++;

      if(listenIndex >= listenOrder.length){
        listenIndex = 0;
        listenOrder = shuffle(ITEMS);
      }

      renderListen();
      playListen();
    }, 650);
  }else{
    button.classList.add("wrong");

    setTimeout(function(){
      button.classList.remove("wrong");
    }, 500);
  }
}

/* ===== GAME 2: MEMORY ===== */

function resetMemory(){
  memoryFirst = null;
  memoryLocked = false;

  const chosen = shuffle(ITEMS).slice(0, 8);
  const cards = [];

  chosen.forEach(function(item, index){
    cards.push({
      pair:index,
      type:"image",
      item:item
    });

    cards.push({
      pair:index,
      type:"word",
      item:item
    });
  });

  const grid = document.getElementById("memoryGrid");

  grid.innerHTML = "";

  shuffle(cards).forEach(function(card){
    const button = document.createElement("button");

    button.className = "memoryCard closed";
    button.dataset.pair = card.pair;
    button.dataset.open = "0";
    button.dataset.matched = "0";

    if(card.type === "image"){
      button.innerHTML = '<img src="' + card.item.img + '" alt="">';
    }else{
      button.innerHTML = '<span>' + card.item.word + '</span>';
    }

    button.onclick = function(){
      openMemoryCard(button, card);
    };

    grid.appendChild(button);
  });
}

function openMemoryCard(button, card){
  if(memoryLocked){
    return;
  }

  if(button.dataset.open === "1"){
    return;
  }

  if(button.dataset.matched === "1"){
    return;
  }

  button.classList.remove("closed");
  button.dataset.open = "1";

  if(card.type === "word"){
    playAudio(card.item.audio);
  }

  if(!memoryFirst){
    memoryFirst = button;
    return;
  }

  memoryLocked = true;

  if(memoryFirst.dataset.pair === button.dataset.pair){
    memoryFirst.classList.add("matched");
    button.classList.add("matched");

    memoryFirst.dataset.matched = "1";
    button.dataset.matched = "1";

    memoryFirst = null;
    memoryLocked = false;
  }else{
    memoryFirst.classList.add("wrong");
    button.classList.add("wrong");

    setTimeout(function(){
      memoryFirst.classList.remove("wrong");
      button.classList.remove("wrong");

      memoryFirst.classList.add("closed");
      button.classList.add("closed");

      memoryFirst.dataset.open = "0";
      button.dataset.open = "0";

      memoryFirst = null;
      memoryLocked = false;
    }, 900);
  }
}

/* ===== GAME 3: SORTÉIER NOM GENRE ===== */

function resetSort(){
  selectedSortTile = null;

  const pool = document.getElementById("sortPool");
  const columns = document.getElementById("sortColumns");

  pool.innerHTML = "";
  columns.innerHTML = "";

  const categories = [
    {
      id:"m",
      label:"männlech"
    },
    {
      id:"f",
      label:"weiblech"
    },
    {
      id:"n",
      label:"sächlech"
    }
  ];

  categories.forEach(function(category){
    const column = document.createElement("div");

    column.className = "sortColumn";
    column.dataset.category = category.id;
    column.innerHTML = '<h2>' + category.label + '</h2>';

    column.onclick = function(){
      placeSortTile(column, category.id);
    };

    columns.appendChild(column);
  });

  shuffle(ITEMS).forEach(function(item){
    const tile = document.createElement("button");

    tile.className = "sortTile";
    tile.dataset.category = item.gender;
    tile.dataset.audio = item.audio;
    tile.innerHTML = '<img src="' + item.img + '" alt="">';

    tile.onclick = function(event){
      event.stopPropagation();
      selectSortTile(tile, item);
    };

    pool.appendChild(tile);
  });
}

function selectSortTile(tile, item){
  document.querySelectorAll(".sortTile").forEach(function(otherTile){
    otherTile.classList.remove("selected");
  });

  selectedSortTile = tile;
  selectedSortTile.classList.add("selected");

  playAudio(item.audio);
}

function placeSortTile(column, categoryId){
  if(!selectedSortTile){
    return;
  }

  if(selectedSortTile.dataset.category === categoryId){
    selectedSortTile.classList.remove("selected");
    selectedSortTile.classList.remove("wrong");
    selectedSortTile.classList.add("correct");

    column.appendChild(selectedSortTile);

    selectedSortTile = null;
  }else{
    selectedSortTile.classList.add("wrong");

    setTimeout(function(){
      if(selectedSortTile){
        selectedSortTile.classList.remove("wrong");
      }
    }, 500);
  }
}

/* ===== GAME 4: WÉI ASS DE PLURIEL? ===== */

function resetPlural(){
  pluralOrder = shuffle(ITEMS);
  pluralIndex = 0;

  renderPluralRound();
}

function makePluralOptions(item){
  const options = new Set();

  options.add(item.plural);
  options.add(item.simple);
  options.add(item.simple + "en");

  const vowelSwap = item.simple
    .replace("o", "ë")
    .replace("O", "Ë")
    .replace("a", "ä")
    .replace("A", "Ä")
    .replace("u", "ou")
    .replace("U", "Ou");

  options.add(vowelSwap);

  while(options.size < 3){
    const randomItem = ITEMS[Math.floor(Math.random() * ITEMS.length)];
    options.add(randomItem.plural);
  }

  return shuffle([...options]).slice(0, 3);
}

function renderPluralRound(){
  const item = pluralOrder[pluralIndex];
  const image = document.getElementById("pluralImage");
  const optionsBox = document.getElementById("pluralOptions");

  image.src = item.img;
  optionsBox.innerHTML = "";

  makePluralOptions(item).forEach(function(optionText){
    const button = document.createElement("button");

    button.className = "pluralOption";
    button.textContent = optionText;

    button.onclick = function(){
      checkPluralAnswer(button, optionText, item);
    };

    optionsBox.appendChild(button);
  });
}

function checkPluralAnswer(button, optionText, item){
  if(optionText === item.plural){
    button.classList.add("correct");

    setTimeout(function(){
      pluralIndex++;

      if(pluralIndex >= pluralOrder.length){
        pluralIndex = 0;
        pluralOrder = shuffle(ITEMS);
      }

      renderPluralRound();
    }, 700);
  }else{
    button.classList.add("wrong");

    setTimeout(function(){
      button.classList.remove("wrong");
    }, 500);
  }
}

/* ===== GAME 5: D’AKAFSLËSCHT ===== */

function quantityText(quantity, item){
  if(quantity === 1){
    if(item.gender === "f"){
      return "eng " + item.simple;
    }

    return "een " + item.simple;
  }

  if(quantity === 2){
    if(item.gender === "f"){
      return "zwou " + item.plural;
    }

    return "zwee " + item.plural;
  }

  return NUMBER_WORDS[quantity] + " " + item.plural;
}

function resetShopping(){
  shoppingCounts = {};
  shoppingVisibleItems = shuffle(SHOP_ITEMS).slice(0, 12);
  shoppingTargets = shuffle(shoppingVisibleItems).slice(0, 4);

  shoppingTargets.forEach(function(item){
    shoppingCounts[item.simple] = {
      item:item,
      needed:Math.floor(Math.random() * 10) + 1,
      found:0
    };
  });

  renderShoppingList();
  renderStalls();
  renderBag();

  const message = document.getElementById("shopMessage");
  message.textContent = "";
  message.className = "shopMessage";
}

function renderShoppingList(){
  const list = document.getElementById("shoppingList");

  list.innerHTML = "";

  shoppingTargets.forEach(function(item){
    const entry = document.createElement("li");
    const quantity = shoppingCounts[item.simple].needed;

    entry.textContent = quantityText(quantity, item);

    list.appendChild(entry);
  });
}

function renderStalls(){
  const stalls = document.getElementById("stalls");

  stalls.innerHTML = "";

  for(let stallIndex = 0; stallIndex < 3; stallIndex++){
    const stall = document.createElement("div");

    stall.className = "stall";

    const stallItems = shoppingVisibleItems.slice(stallIndex * 4, stallIndex * 4 + 4);

    stallItems.forEach(function(item, slotIndex){
      const compartment = document.createElement("div");

      compartment.className = "stallCompartment";
      compartment.dataset.slot = slotIndex;
      compartment.dataset.simple = item.simple;

      for(let copyIndex = 0; copyIndex < 8; copyIndex++){
        const img = document.createElement("img");

        img.className = "shopItem";
        img.src = item.img;
        img.alt = "";
        img.draggable = true;
        img.dataset.simple = item.simple;
        img.dataset.source = "stall";

        img.addEventListener("dragstart", function(event){
          event.dataTransfer.setData("text/plain", item.simple);
          event.dataTransfer.setData("source", "stall");
        });

        img.onclick = function(){
          addToBag(item.simple);
        };

        compartment.appendChild(img);
      }

      stall.appendChild(compartment);
    });

    stalls.appendChild(stall);
  }
}

function renderBag(){
  const bag = document.getElementById("bagDrop");

  bag.innerHTML = "";

  bag.ondragover = function(event){
    event.preventDefault();
  };

  bag.ondrop = function(event){
    event.preventDefault();

    const simple = event.dataTransfer.getData("text/plain");
    const source = event.dataTransfer.getData("source");
    const bagItemId = event.dataTransfer.getData("bagItemId");

    if(source === "bag"){
      removeBagItem(bagItemId);
      return;
    }

    addToBag(simple);
  };
}

function addToBag(simple){
  const item = SHOP_ITEMS.find(function(shopItem){
    return shopItem.simple === simple;
  });

  if(!item){
    return;
  }

  if(!shoppingCounts[simple]){
    shoppingCounts[simple] = {
      item:item,
      needed:0,
      found:0
    };
  }

  shoppingCounts[simple].found++;

  addBagItem(item);

  const message = document.getElementById("shopMessage");
  message.textContent = "";
  message.className = "shopMessage";
}

function addBagItem(item){
  const bag = document.getElementById("bagDrop");
  const img = document.createElement("img");
  const bagItemId = "bag-" + Date.now() + "-" + Math.floor(Math.random() * 10000);

  img.className = "bagItem";
  img.src = item.img;
  img.alt = "";
  img.draggable = true;
  img.dataset.simple = item.simple;
  img.dataset.bagItemId = bagItemId;

  const existingItems = bag.querySelectorAll(".bagItem").length;
  const columns = 5;
  const row = Math.floor(existingItems / columns);
  const column = existingItems % columns;

  img.style.left = (22 + column * 12) + "%";
  img.style.top = (42 + row * 13) + "%";

  img.addEventListener("dragstart", function(event){
    event.dataTransfer.setData("text/plain", item.simple);
    event.dataTransfer.setData("source", "bag");
    event.dataTransfer.setData("bagItemId", bagItemId);
  });

  img.onclick = function(){
    removeBagItem(bagItemId);
  };

  bag.appendChild(img);
}

function removeBagItem(bagItemId){
  const bagItem = document.querySelector('[data-bag-item-id="' + bagItemId + '"]');

  if(!bagItem){
    return;
  }

  const simple = bagItem.dataset.simple;

  if(shoppingCounts[simple]){
    shoppingCounts[simple].found = Math.max(0, shoppingCounts[simple].found - 1);
  }

  bagItem.remove();

  reorganiseBagItems();

  const message = document.getElementById("shopMessage");
  message.textContent = "";
  message.className = "shopMessage";
}

function reorganiseBagItems(){
  const bagItems = document.querySelectorAll(".bagItem");
  const columns = 5;

  bagItems.forEach(function(img, index){
    const row = Math.floor(index / columns);
    const column = index % columns;

    img.style.left = (22 + column * 12) + "%";
    img.style.top = (42 + row * 13) + "%";
  });
}

function checkShoppingAnswer(){
  const message = document.getElementById("shopMessage");

  const correctTargets = shoppingTargets.every(function(item){
    return shoppingCounts[item.simple].found === shoppingCounts[item.simple].needed;
  });

  const noExtraItems = Object.keys(shoppingCounts).every(function(simple){
    return shoppingCounts[simple].needed > 0 || shoppingCounts[simple].found === 0;
  });

  if(correctTargets && noExtraItems){
    message.textContent = "Richteg!";
    message.className = "shopMessage ok";

    setTimeout(function(){
      resetShopping();
    }, 1200);
  }else{
    message.textContent = "Kuck nach eng Kéier.";
    message.className = "shopMessage bad";
  }
}
